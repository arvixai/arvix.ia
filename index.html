<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARVIX IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #141416;
    --surface2: #1c1c1f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8ea;
    --text-muted: #7a7a82;
    --accent: #7c6af7;
    --accent-soft: rgba(124,106,247,0.12);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  header h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .message {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .user {
    background: var(--accent-soft);
    border: 1px solid rgba(124,106,247,0.2);
    margin-left: auto;
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .bot {
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-right: auto;
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bot p { margin-bottom: 8px; }
  .bot p:last-child { margin-bottom: 0; }
  .bot code {
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 5px;
  }
  .bot pre {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .bot pre code { background: none; padding: 0; }
  .bot ul, .bot ol { padding-left: 18px; }
  .bot li { margin-bottom: 4px; }

  .thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: blink 1.2s ease-in-out infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .chat-image {
    max-width: 220px;
    border-radius: var(--radius-sm);
    display: block;
    margin-top: 8px;
    border: 1px solid var(--border);
  }

  #inputArea {
    padding: 14px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
    position: relative;
  }

  #fileMenu {
    position: absolute;
    bottom: 68px;
    left: 16px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: none;
    flex-direction: column;
    z-index: 10;
    min-width: 160px;
  }

  #fileMenu.open { display: flex; }

  .fileOption {
    padding: 11px 16px;
    font-size: 13.5px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fileOption:hover { background: rgba(255,255,255,0.05); }

  #imagePreviewBar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #imagePreviewBar img {
    width: 44px;
    height: 44px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border2);
  }

  #removeImage {
    font-size: 18px;
    cursor: pointer;
    color: var(--text-muted);
    background: none;
    border: none;
    line-height: 1;
    padding: 0 4px;
    transition: color 0.15s;
  }

  #removeImage:hover { color: var(--text); }

  #previewLabel {
    font-size: 12px;
    color: var(--text-muted);
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
    transition: background 0.15s, color 0.15s;
  }

  .icon-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }

  #input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 10px 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #input:focus { border-color: var(--border2); }
  #input::placeholder { color: var(--text-muted); }

  #sendBtn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    border: none;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  #sendBtn:hover { opacity: 0.85; }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  #sendBtn svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>ARVIX IA</h1>
</header>

<div id="chat"></div>

<div id="imagePreviewBar">
  <img id="previewThumb" src="" alt="preview">
  <span id="previewLabel">Imagem selecionada</span>
  <button id="removeImage" onclick="removeImage()" title="Remover">✕</button>
</div>

<div id="inputArea">
  <button class="icon-btn" onclick="toggleMenu()" title="Anexar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <div id="fileMenu">
    <div class="fileOption" onclick="selectFile()"> Enviar imagem</div>
    <div class="fileOption" onclick="takePhoto()"> Tirar foto</div>
  </div>

  <textarea id="input" rows="1" placeholder="Digite sua mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>

  <button id="sendBtn" onclick="send()" title="Enviar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>

  <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(this)">
  <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
</div>

<script>
const BACKEND = 'https://arvix-backend.onrender.com/chat'

const chat = document.getElementById('chat')
const input = document.getElementById('input')
const sendBtn = document.getElementById('sendBtn')
let selectedFile = null

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'
}

function addMessage(text, type) {
  const div = document.createElement('div')
  div.className = 'message ' + type
  div.innerHTML = marked.parse(text)
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
  return div
}

function addThinking() {
  const div = document.createElement('div')
  div.className = 'message bot thinking'
  div.innerHTML = '<span></span><span></span><span></span>'
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
  return div
}

function addImageToChat(src) {
  const div = document.createElement('div')
  div.className = 'message user'
  const img = document.createElement('img')
  img.src = src
  img.className = 'chat-image'
  div.appendChild(img)
  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

function toggleMenu() {
  document.getElementById('fileMenu').classList.toggle('open')
}

function selectFile() {
  document.getElementById('imageInput').click()
  document.getElementById('fileMenu').classList.remove('open')
}

function takePhoto() {
  document.getElementById('cameraInput').click()
  document.getElementById('fileMenu').classList.remove('open')
}

function previewImage(input) {
  const file = input.files[0]
  if (!file) return
  selectedFile = file
  const reader = new FileReader()
  reader.onload = (e) => {
    document.getElementById('previewThumb').src = e.target.result
    document.getElementById('imagePreviewBar').style.display = 'flex'
  }
  reader.readAsDataURL(file)
}

function removeImage() {
  selectedFile = null
  document.getElementById('imageInput').value = ''
  document.getElementById('cameraInput').value = ''
  document.getElementById('imagePreviewBar').style.display = 'none'
  document.getElementById('previewThumb').src = ''
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.readAsDataURL(file)
    reader.onload = () => resolve(reader.result)
    reader.onerror = reject
  })
}

async function send() {
  const text = input.value.trim()
  const file = selectedFile

  if (!text && !file) return

  sendBtn.disabled = true

  if (text) addMessage(text, 'user')

  let imageBase64 = null
  if (file) {
    imageBase64 = await toBase64(file)
    addImageToChat(imageBase64)
    removeImage()
  }

  input.value = ''
  input.style.height = 'auto'

  const thinking = addThinking()

  try {
    const body = {}
    if (text) body.message = text
    if (imageBase64) body.image = imageBase64

    const response = await fetch(BACKEND, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })

    const data = await response.json()
    thinking.remove()

    if (data.error) {
      addMessage('Erro: ' + data.error, 'bot')
    } else {
      addMessage(data.reply, 'bot')
    }

  } catch {
    thinking.remove()
    addMessage('Não consegui conectar ao servidor. Tente novamente.', 'bot')
  }

  sendBtn.disabled = false
  input.focus()
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    send()
  }
}

document.addEventListener('click', (e) => {
  const menu = document.getElementById('fileMenu')
  if (!e.target.closest('#inputArea')) {
    menu.classList.remove('open')
  }
})

addMessage('Olá! Eu sou a **ARVIX**, sua assistente de inteligência artificial. Pode me enviar texto ou imagens. Como posso te ajudar?', 'bot')
</script>

</body>
</html>
