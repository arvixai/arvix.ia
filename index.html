<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ARVIX IA</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
background:#0b0b0b;
color:#e5e5e5;
font-family:Arial, sans-serif;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:10px 0;
padding:12px;
border-radius:12px;
max-width:70%;
line-height:1.4;
}

.user{background:#2a2a2a;margin-left:auto;}
.bot{background:#1a1a1a;}

#inputArea{
display:flex;
align-items:center;
padding:10px;
background:#111;
border-top:1px solid #222;
gap:10px;
position:relative;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
background:#1f1f1f;
color:white;
outline:none;
}

button{
background:#1f1f1f;
border:none;
color:white;
padding:10px 14px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

#sendBtn{
border-radius:20px;
padding:10px 18px;
}

img.chatImage{
max-width:250px;
border-radius:10px;
margin-top:8px;
}

#fileMenu{
position:absolute;
bottom:60px;
left:10px;
background:#1a1a1a;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
overflow:hidden;
}

.fileOption{
padding:10px 15px;
cursor:pointer;
}

.fileOption:hover{
background:#2a2a2a;
}
</style>
</head>

<body>

<header>ARVIX IA</header>

<div id="chat"></div>

<div id="inputArea">

<button onclick="toggleMenu()">+</button>

<div id="fileMenu">
<div class="fileOption" onclick="selectFile()"> Enviar imagem</div>
<div class="fileOption" onclick="takePhoto()"> Tirar foto</div>
</div>

<input id="input" placeholder="Digite sua mensagem..." onkeydown="enter(event)">

<button id="sendBtn" onclick="send()">Enviar</button>

<input type="file" id="imageInput" accept="image/*" style="display:none">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

</div>

<script>

const API_KEY = "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"
const chat = document.getElementById("chat")

let history = [
{
role:"system",
content:"Você é ARVIX IA, criada por Isabelle Pereira. Você conversa e analisa imagens."
}
]

function addMessage(text,type){
let div = document.createElement("div")
div.className = "message "+type
div.innerHTML = marked.parse(text)
chat.appendChild(div)
chat.scrollTop = chat.scrollHeight
}

function addImageToChat(src,type){
let img = document.createElement("img")
img.src = src
img.className = "chatImage"
let div = document.createElement("div")
div.className = "message "+type
div.appendChild(img)
chat.appendChild(div)
chat.scrollTop = chat.scrollHeight
}

function toggleMenu(){
let menu = document.getElementById("fileMenu")
menu.style.display = menu.style.display === "flex" ? "none" : "flex"
}

function selectFile(){
document.getElementById("imageInput").click()
toggleMenu()
}

function takePhoto(){
document.getElementById("cameraInput").click()
toggleMenu()
}

function toBase64(file){
return new Promise((resolve,reject)=>{
let reader = new FileReader()
reader.readAsDataURL(file)
reader.onload = ()=>resolve(reader.result)
reader.onerror = reject
})
}

async function send(){

let input = document.getElementById("input")
let text = input.value.trim()
let file = document.getElementById("imageInput").files[0] || document.getElementById("cameraInput").files[0]

if(!text && !file) return

if(text) addMessage(text,"user")

let content = []

if(text){
content.push({type:"text",text:text})
}

if(file){
let base64 = await toBase64(file)
addImageToChat(base64,"user")
content.push({
type:"image_url",
image_url:{url:base64}
})
}

addMessage("Pensando...","bot")

try{
const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"openai/gpt-4o-mini",
messages:[
history[0],
{role:"user",content:content}
]
})
})

const data = await response.json()
chat.lastChild.remove()

if(data.error){
addMessage("Erro: "+data.error.message,"bot")
return
}

let reply = data.choices[0].message.content
addMessage(reply,"bot")

}catch{
chat.lastChild.remove()
addMessage("Erro ao conectar com a IA.","bot")
}

input.value=""
document.getElementById("imageInput").value=""
document.getElementById("cameraInput").value=""
}

function enter(e){
if(e.key==="Enter") send()
}

addMessage("Olá! Eu sou a *ARVIX*. sua assistente de inteligência artificial. Como posso te ajudar hoje?.","bot")

</script>

</body>
</html>
